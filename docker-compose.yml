services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - VALIDATOR_ALGORITHM=bliss
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:password@ep-xyz.neon.tech/neondb?sslmode=require}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
